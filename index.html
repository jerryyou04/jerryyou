<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f6f8" />
    <meta
      name="description"
      content="Computer Science student at the University of Guelph. Portfolio of work experience and selected projects."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jerryyou.com/" />
    <meta property="og:site_name" content="Jerry You" />
    <meta property="og:title" content="Jerry You" />
    <meta
      property="og:description"
      content="Computer Science student at the University of Guelph. Portfolio of work experience and selected projects."
    />
    <meta property="og:image" content="https://jerryyou.com/favicon.png" />
    <meta property="og:image:alt" content="Jerry You portfolio mark" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Jerry You" />
    <meta
      name="twitter:description"
      content="Computer Science student at the University of Guelph. Portfolio of work experience and selected projects."
    />
    <link rel="canonical" href="https://jerryyou.com/" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Jerry You</title>
    <script>
      try {
        const savedTheme = localStorage.getItem("jerry-you-portfolio-theme");
        if (savedTheme === "light" || savedTheme === "dark") {
          document.documentElement.dataset.theme = savedTheme;
        }
      } catch {
        // The portfolio defaults to light when browser storage is unavailable.
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
